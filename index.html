<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"
    />
    <meta name="color-scheme" content="light" />
    <meta name="supported-color-schemes" content="light" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="FOM Play" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <title>FOM Play - Padel Tournament</title>
    <meta name="theme-color" content="#111827" />
    <meta name="description" content="Padel Tournament & MMR System" />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />
    <script>
      (function () {
        const canonicalHost = 'fomplay.asia';
        const host = window.location.hostname.toLowerCase();
        const defaultHosts = new Set([
          'gen-lang-client-0996764238.web.app',
          'gen-lang-client-0996764238.firebaseapp.com',
        ]);
        const isLocalHost =
          host === 'localhost' ||
          host === '127.0.0.1' ||
          host === '0.0.0.0' ||
          host.endsWith('.local');

        if (isLocalHost) return;

        const canonicalUrl =
          'https://' +
          canonicalHost +
          window.location.pathname +
          window.location.search +
          window.location.hash;

        const canonicalLink = document.createElement('link');
        canonicalLink.rel = 'canonical';
        canonicalLink.href = canonicalUrl;
        document.head.appendChild(canonicalLink);

        if (defaultHosts.has(host)) {
          const robotsMeta = document.createElement('meta');
          robotsMeta.name = 'robots';
          robotsMeta.content = 'noindex, nofollow, noarchive';
          document.head.appendChild(robotsMeta);
          window.location.replace(canonicalUrl);
        }
      })();
    </script>
    <style>
      html, body, #root {
        margin: 0;
        width: 100%;
        height: 100%;
        background: #111827;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
