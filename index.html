    <script>
      (function () {
        const canonicalHost = 'fomplay.asia';
        const host = window.location.hostname.toLowerCase();
        const isAppRoute = window.location.pathname === '/app' || window.location.pathname.startsWith('/app/');
        const defaultHosts = new Set([
          'gen-lang-client-0996764238.web.app',
          'gen-lang-client-0996764238.firebaseapp.com',
        ]);
        const isLocalHost =
          host === 'localhost' ||
          host === '127.0.0.1' ||
          host === '0.0.0.0' ||
          host.endsWith('.local');

        if (isLocalHost) return;

        if (!isAppRoute && 'serviceWorker' in navigator) {
          navigator.serviceWorker.getRegistrations()
            .then(function (registrations) {
              return Promise.all(registrations.map(function (registration) {
                return registration.unregister();
              }));
            })
            .then(function () {
              if (!('caches' in window)) return undefined;
              return caches.keys().then(function (cacheNames) {
                return Promise.all(cacheNames.map(function (cacheName) {
                  return caches.delete(cacheName);
                }));
              });
            })
            .catch(function () {});
        }

        const canonicalUrl =
          'https://' +
          canonicalHost +
          window.location.pathname +
          window.location.search +
          window.location.hash;

        const canonicalLink = document.createElement('link');
        canonicalLink.rel = 'canonical';
        canonicalLink.href = canonicalUrl;
        document.head.appendChild(canonicalLink);

        if (defaultHosts.has(host)) {
          const robotsMeta = document.createElement('meta');
          robotsMeta.name = 'robots';
          robotsMeta.content = 'noindex, nofollow, noarchive';
          document.head.appendChild(robotsMeta);
          window.location.replace(canonicalUrl);
        }
      })();
    </script>
