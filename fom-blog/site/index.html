<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── TOKENS ───────────────────────────────────────
const C = {  primary: '#ff5500',
  primaryDark: '#e65e14',
  surface: '#f7f7fa',
  surface2: '#f0f0f4',
  white: '#ffffff',
  fg1: '#111827',
  fg2: '#374151',
  fg3: '#6b7280',
  fg4: '#8e8e93',
  dark: '#111827',
  dark2: '#1f2937',
};
const FONT_DISPLAY = "'Helvetica Neue LT Pro', 'Helvetica Neue', Arial, sans-serif";
const FONT_BODY    = "'Plus Jakarta Sans', 'Helvetica Neue', Arial, sans-serif";

// ── RESPONSIVE HOOK ──────────────────────────────
function useIsMobile() {
  const [isMobile, setIsMobile] = useState(typeof window !== 'undefined' && window.innerWidth <= 768);
  useEffect(() => {
    const fn = () => setIsMobile(window.innerWidth <= 768);
    window.addEventListener('resize', fn);
    return () => window.removeEventListener('resize', fn);
  }, []);
  return isMobile;
}

// ── ICON COMPONENT ────────────────────────────────
function Icon({ name, size = 20, color = 'currentColor', strokeWidth = 2 }) {
  const ref = useRef(null);
  useEffect(() => {
    if (!ref.current || !window.lucide) return;
    ref.current.innerHTML = `<i data-lucide="${name}" style="width:${size}px;height:${size}px;color:${color};stroke-width:${strokeWidth}"></i>`;
    try { window.lucide.createIcons({ nodes: [ref.current.querySelector('i')] }); } catch(e) {}
  }, [name, size, color, strokeWidth]);
  return <span ref={ref} className="icon" style={{ display: 'inline-flex', alignItems: 'center', justifyContent: 'center' }} />;
}

// ── NAV ───────────────────────────────────────────
function Nav({ headerStyle = 'white', onNav, view }) {
  const [scrolled, setScrolled] = useState(false);
  const [menuOpen, setMenuOpen] = useState(false);
  const isMobile = useIsMobile();

  useEffect(() => {
    const onScroll = () => setScrolled(window.scrollY > 8);
    onScroll();
    window.addEventListener('scroll', onScroll, { passive: true });
    return () => window.removeEventListener('scroll', onScroll);
  }, []);

  const styles = {
    white: { bg: scrolled ? 'rgba(255,255,255,0.92)' : 'white', color: C.fg1, border: scrolled ? 'rgba(0,0,0,0.07)' : 'rgba(0,0,0,0.06)', blur: true },
    dark:  { bg: C.dark, color: 'white', border: 'rgba(255,255,255,0.08)', blur: false },
    orange:{ bg: C.primary, color: 'white', border: 'rgba(255,255,255,0.18)', blur: false },
  };
  const s = styles[headerStyle] || styles.white;

  const navLinks = ['Fitur', 'Format', 'Ranking', 'Blog', 'FAQ'];
  const handleNavClick = (label) => {
    setMenuOpen(false);
    if (label === 'Fitur') return onNav('features');
    if (label === 'Format') return onNav('format');
    if (label === 'Ranking') return onNav('ranking');
    if (label === 'Blog') return onNav('blog');
    if (label === 'FAQ') return onNav('faq');
    return onNav('home');
  };

  return (
    <nav style={{
      position: 'sticky', top: 0, zIndex: 100,
      background: s.bg,
      borderBottom: `1px solid ${s.border}`,
      backdropFilter: s.blur ? 'blur(20px)' : 'none',
      WebkitBackdropFilter: s.blur ? 'blur(20px)' : 'none',
      transition: 'all 0.2s',
    }}>
      <div style={{ maxWidth: 1200, margin: '0 auto', padding: '0 24px', height: 64, display: 'flex', alignItems: 'center', justifyContent: 'space-between' }}>
        {/* Logo */}
        <div style={{ display: 'flex', alignItems: 'center', cursor: 'pointer' }} onClick={() => onNav('home')}>
          <img src="/fom-logotype-nav.png?v=20260421-logo2" alt="FOM" style={{ height: 34, width: 'auto', objectFit: 'contain', flexShrink: 0 }} />
        </div>

        {isMobile ? (
          <button
            onClick={() => setMenuOpen((value) => !value)}
            aria-label="Buka menu"
            style={{
              height: 38,
              minWidth: 38,
              padding: '0 12px',
              background: headerStyle === 'white' ? 'rgba(0,0,0,0.04)' : 'rgba(255,255,255,0.12)',
              color: s.color,
              border: headerStyle === 'white' ? '1px solid rgba(0,0,0,0.08)' : '1px solid rgba(255,255,255,0.18)',
              borderRadius: 10,
              fontSize: 13,
              fontWeight: 700,
              cursor: 'pointer',
              fontFamily: 'inherit',
              display: 'flex',
              alignItems: 'center',
              gap: 6,
            }}
          >
            <Icon name={menuOpen ? 'x' : 'menu'} size={16} color={s.color} />
            Menu
          </button>
        ) : (
          <div style={{ display: 'flex', gap: 6, alignItems: 'center' }}>
          {navLinks.map(l => (
            <button key={l} onClick={() => handleNavClick(l)} style={{
              background: 'none', border: 'none', cursor: 'pointer',
              padding: '6px 12px', borderRadius: 8, fontSize: 14, fontWeight: 600,
              color: s.color === 'white' ? 'rgba(255,255,255,0.85)' : C.fg2,
              transition: 'all 0.12s',
              fontFamily: 'inherit',
            }}
            onMouseEnter={e => e.target.style.background = s.color === 'white' ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.04)'}
            onMouseLeave={e => e.target.style.background = 'none'}
            >{l}</button>
          ))}
          <a href="https://fomplay.asia/app" style={{
            marginLeft: 8, height: 38, padding: '0 18px',
            background: headerStyle === 'white' ? C.primary : 'rgba(255,255,255,0.18)',
            color: 'white',
            border: headerStyle === 'white' ? 'none' : '1.5px solid rgba(255,255,255,0.3)',
            borderRadius: 10, fontSize: 14, fontWeight: 700, cursor: 'pointer',
            fontFamily: 'inherit', transition: 'all 0.12s',
            boxShadow: headerStyle === 'white' ? '0 2px 10px rgba(230,94,20,0.22)' : 'none',
            display: 'inline-flex', alignItems: 'center', textDecoration: 'none',
          }}
          onMouseEnter={e => e.target.style.transform = 'scale(1.02)'}
          onMouseLeave={e => e.target.style.transform = 'scale(1)'}
          >Coba Gratis</a>
        </div>
        )}
      </div>
      {isMobile && menuOpen ? (
        <div style={{
          padding: '0 20px 18px',
          borderTop: `1px solid ${s.border}`,
          background: s.bg,
          backdropFilter: s.blur ? 'blur(20px)' : 'none',
        }}>
          <div style={{ display: 'grid', gap: 10, paddingTop: 14 }}>
            {navLinks.map((label) => (
              <button
                key={label}
                onClick={() => handleNavClick(label)}
                style={{
                  height: 44,
                  borderRadius: 12,
                  border: '1px solid rgba(0,0,0,0.06)',
                  background: 'white',
                  color: C.fg1,
                  textAlign: 'left',
                  padding: '0 14px',
                  fontSize: 14,
                  fontWeight: 700,
                  fontFamily: 'inherit',
                  cursor: 'pointer',
                }}
              >
                {label}
              </button>
            ))}
            <a
              href="https://fomplay.asia/app"
              style={{
                height: 46,
                borderRadius: 12,
                border: 'none',
                background: C.primary,
                color: 'white',
                fontSize: 14,
                fontWeight: 800,
                fontFamily: 'inherit',
                cursor: 'pointer',
                boxShadow: '0 8px 20px rgba(230,94,20,0.25)',
                display: 'flex',
                alignItems: 'center',
                justifyContent: 'center',
                textDecoration: 'none',
              }}
            >
              Coba Gratis
            </a>
          </div>
        </div>
      ) : null}
    </nav>
  );
}

// ── HERO ─────────────────────────────────────────
function Hero({ heroStyle = 'photo', onNav }) {
  const isMobile = useIsMobile();
  const isCompactMobile = isMobile && window.innerWidth < 360;
  const styles = {
    photo: {
      background: `linear-gradient(to bottom, rgba(17,24,39,0.65) 0%, rgba(17,24,39,0.85) 100%), url('/assets/match-hero.jpg?v=20260421-logo2') center/cover`,
      textColor: 'white',
      subColor: 'rgba(255,255,255,0.7)',
    },
    dark: {
      background: C.dark,
      textColor: 'white',
      subColor: 'rgba(255,255,255,0.6)',
    },
    orange: {
      background: `linear-gradient(135deg, #e65e14 0%, #ff5501 50%, #c44e0f 100%)`,
      textColor: 'white',
      subColor: 'rgba(255,255,255,0.75)',
    },
  };
  const s = styles[heroStyle] || styles.photo;

  return (
    <section style={{ background: s.background, minHeight: isMobile ? 0 : 560, display: 'flex', alignItems: 'center', position: 'relative', overflow: 'hidden' }}>
      {/* Decorative motion line accent */}
      <div style={{
        position: 'absolute', top: 0, right: 0, width: '45%', height: '100%', opacity: 0.06,
        backgroundImage: `repeating-linear-gradient(135deg, ${heroStyle === 'orange' ? 'white' : '#e65e14'} 0px, ${heroStyle === 'orange' ? 'white' : '#e65e14'} 2px, transparent 2px, transparent 40px)`,
        pointerEvents: 'none',
      }}/>

      <div className="r-hero" style={{ maxWidth: 1200, margin: '0 auto', padding: '80px 24px', display: 'grid', gridTemplateColumns: '1fr 1fr', gap: 60, alignItems: 'center', width: '100%' }}>
        {/* Left */}
        <div className={isMobile ? 'r-mobile-center' : ''}>
          <div style={{ display: 'inline-flex', alignItems: 'center', gap: 6, background: 'rgba(255,255,255,0.15)', border: '1px solid rgba(255,255,255,0.35)', borderRadius: 9999, padding: '5px 12px', marginBottom: 24, backdropFilter: 'blur(8px)' }}>
            <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#ff5500', flexShrink: 0 }}></span>
            <span style={{ fontSize: 12, fontWeight: 700, color: 'white', letterSpacing: '0.06em', textTransform: 'uppercase' }}>Padel App #1 di Indonesia</span>
          </div>
          <h1 style={{
            fontSize: isCompactMobile ? 23 : isMobile ? 'clamp(29px, 7.4vw, 42px)' : 'clamp(40px, 4.2vw, 52px)',
            fontFamily: FONT_DISPLAY,
            fontWeight: 800,
            letterSpacing: isCompactMobile ? '-0.012em' : isMobile ? '-0.018em' : '-0.024em',
            lineHeight: 1.08,
            color: s.textColor,
            marginBottom: isMobile ? 18 : 20,
            textWrap: 'balance',
          }}>
            <>
              <span style={{ whiteSpace: 'nowrap' }}>Mabar padel makin seru</span><br/>
              <span style={{ whiteSpace: 'nowrap' }}>dengan FOM Play</span>
            </>
          </h1>
          <p style={{ fontSize: isMobile ? 15 : 18, color: s.subColor, lineHeight: 1.6, maxWidth: 460, marginBottom: isMobile ? 28 : 36 }}>
            Atur format dan ronde, nikmati live score real-time, dan bagikan klasemen langsung ke Instagram Story tanpa ribet, langsung jadi.
          </p>
          <div className={isMobile ? 'r-mobile-stack' : ''} style={{ display: 'flex', gap: 12, flexWrap: 'wrap' }}>
            <a href="https://fomplay.asia/app" style={{
              height: 52, padding: '0 28px', background: C.primary, color: 'white',
              borderRadius: 12, fontSize: 16, fontWeight: 700, border: 'none', cursor: 'pointer',
              fontFamily: 'inherit', boxShadow: '0 4px 20px rgba(230,94,20,0.35)',
              transition: 'all 0.15s', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8,
              width: isMobile ? '100%' : 'auto', textDecoration: 'none',
            }}
            onMouseEnter={e => e.currentTarget.style.transform = 'scale(1.02)'}
            onMouseLeave={e => e.currentTarget.style.transform = 'scale(1)'}
            >
              Coba Gratis <Icon name="arrow-right" size={18} />
            </a>
            <button onClick={() => onNav('blog')} style={{
              height: 52, padding: '0 24px',
              background: heroStyle === 'photo' || heroStyle === 'dark' ? 'rgba(255,255,255,0.1)' : 'rgba(255,255,255,0.18)',
              color: 'white', border: '1.5px solid rgba(255,255,255,0.25)',
              borderRadius: 12, fontSize: 15, fontWeight: 600, cursor: 'pointer',
              fontFamily: 'inherit', transition: 'all 0.15s', width: isMobile ? '100%' : 'auto',
            }}>{isMobile ? 'Lihat cara kerjanya' : 'Pelajari FOM Play'}</button>
          </div>

          <div style={{ display: 'flex', gap: isMobile ? 10 : 24, marginTop: isMobile ? 30 : 40, alignItems: isMobile ? 'center' : 'flex-start', justifyContent: isMobile ? 'center' : 'flex-start', flexWrap: 'nowrap' }}>
            {[['10k+','Pemain aktif'],['50+','Kota'],['3', 'Format turnamen']].map(([num, label]) => (
              <div key={label} style={{ minWidth: 0, width: isMobile ? '31%' : 'auto', textAlign: isMobile ? 'center' : 'left' }}>
                <div style={{ fontSize: isMobile ? 20 : 22, fontWeight: 800, color: s.textColor }}>{num}</div>
                <div style={{ fontSize: isMobile ? 11 : 12, color: s.subColor, marginTop: 2, whiteSpace: 'nowrap' }}>{label}</div>
              </div>
            ))}
          </div>

          {isMobile ? (
            <div style={{ display: 'flex', justifyContent: 'center', marginTop: 28 }}>
              <div style={{ transform: 'scale(0.9)', transformOrigin: 'top center' }}>
                <AppMockup />
              </div>
            </div>
          ) : null}
        </div>

        {/* Right — App mockup (hidden on mobile) */}
        <div className="r-hide-mobile" style={{ display: 'flex', justifyContent: 'center' }}>
          <AppMockup />
        </div>
      </div>
    </section>
  );
}

// ── APP MOCKUP ────────────────────────────────────
function AppMockup() {
  const scores = [
    { a: ['Andi', 'Budi'], b: ['Cika', 'Dani'], sa: 7, sb: 5 },
    { a: ['Erik', 'Fira'], b: ['Gian', 'Hani'], sa: 3, sb: 6 },
  ];
  return (
    <div style={{
      width: 260, background: '#1a1a2e', borderRadius: 36, padding: '12px 10px',
      boxShadow: '0 40px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.08)',
      position: 'relative',
    }}>
      {/* Phone notch */}
      <div style={{ height: 28, display: 'flex', alignItems: 'center', justifyContent: 'center', marginBottom: 4 }}>
        <div style={{ width: 80, height: 8, background: '#2a2a3e', borderRadius: 4 }}></div>
      </div>

      {/* Status bar */}
      <div style={{ background: '#f7f7fa', borderRadius: 24, overflow: 'hidden' }}>
        {/* Top bar */}
        <div style={{ background: 'white', padding: '14px 16px 10px', borderBottom: '1px solid rgba(0,0,0,0.06)' }}>
          <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
            <span style={{ fontSize: 16, fontWeight: 800, color: C.fg1, letterSpacing: '-0.02em' }}>Ronde 3</span>
            <span style={{ fontSize: 11, fontWeight: 700, background: 'rgba(230,94,20,0.1)', color: C.primary, padding: '3px 8px', borderRadius: 999, letterSpacing: '0.04em' }}>LIVE</span>
          </div>
          <div style={{ fontSize: 11, color: C.fg4, marginTop: 2 }}>Americano · 5 ronde</div>
        </div>

        {/* Match cards */}
        <div style={{ padding: 10, display: 'flex', flexDirection: 'column', gap: 8 }}>
          {scores.map((m, i) => (
            <div key={i} style={{ background: 'white', borderRadius: 16, padding: '12px 14px', border: '1px solid rgba(0,0,0,0.05)', boxShadow: '0 2px 8px rgba(0,0,0,0.04)' }}>
              <div style={{ fontSize: 10, fontWeight: 700, color: C.fg4, letterSpacing: '0.08em', textTransform: 'uppercase', marginBottom: 8 }}>Court {i + 1}</div>
              <div style={{ display: 'flex', justifyContent: 'space-between', alignItems: 'center' }}>
                <div>
                  {m.a.map(p => <div key={p} style={{ fontSize: 12, fontWeight: 600, color: C.fg1 }}>{p}</div>)}
                </div>

const TWEAK_DEFAULTS = {
  "heroStyle": "photo",
  "headerStyle": "white"
};

function getInitialView() {
  if (typeof window === 'undefined') return 'home';
  return window.location.pathname.startsWith('/blog') ? 'blog' : 'home';
}

function scrollToSection(sectionId) {
  const target = document.getElementById(sectionId);
  if (!target) return;
  target.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function App() {
  const [view, setView] = useState(getInitialView);
  const [heroStyle, setHeroStyle] = useState(TWEAK_DEFAULTS.heroStyle);
  const [headerStyle, setHeaderStyle] = useState(TWEAK_DEFAULTS.headerStyle);
  const [article, setArticle] = useState(null);

  const handleNav = (v) => {
    const landingSections = {
      features: 'fitur',
      format: 'format',
    };

    if (landingSections[v]) {
      if (typeof window !== 'undefined' && window.location.pathname !== '/') {
        window.location.assign(`/#${landingSections[v]}`);
        return;
      }

      setView('home');
      setArticle(null);
      window.setTimeout(() => scrollToSection(landingSections[v]), 0);
      return;
    }

    if (v === 'ranking') {
      window.location.assign('/ranking');
      return;
    }

    if (v === 'blog' && typeof window !== 'undefined' && !window.location.pathname.startsWith('/blog')) {
      window.location.assign('/blog');
      return;
    }

    if (v === 'faq') {
      window.location.assign('/faq');
      return;
    }

    setView(v);
    setArticle(null);
    window.scrollTo({ top: 0 });
  };

  useEffect(() => {
    if (view !== 'home' || typeof window === 'undefined') return;
    const sectionId = window.location.hash.replace('#', '');
    if (!sectionId) return;
    window.setTimeout(() => scrollToSection(sectionId), 0);
  }, [view]);
  const handleArticle = (a) => {
    if (a?.slug) {
      window.location.href = getArticlePath(a.slug);
      return;
    }
    setArticle(a);
    setView('article');
    window.scrollTo({ top: 0 });
  };

  return (
    <div style={{ minHeight: '100vh', display: 'flex', flexDirection: 'column' }}>
      <Nav headerStyle={headerStyle} onNav={handleNav} view={view} />
      <main style={{ flex: 1 }}>
        {view === 'home' && <HomePage heroStyle={heroStyle} onNav={handleNav} onArticle={handleArticle} />}
        {view === 'blog' && <BlogListing onArticle={handleArticle} onNav={handleNav} />}
        {view === 'article' && article && <ArticleDetail article={article} onBack={() => { setView('blog'); setArticle(null); }} onArticle={handleArticle} />}
        {view === 'landing' && <CTALanding />}
      </main>
      <Footer />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
